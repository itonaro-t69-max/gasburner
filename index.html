            50% { opacity: 0.8; }

        @keyframes drop-match { 
            0% { transform: translateY(-30px) rotate(-30deg) scale(1.2); opacity: 0; }

// --- Utility: Hold Button (スタッタリング完全防止機構付き) ---
const HoldButton = ({ onAction, onActionStart, onActionEnd, disabled, className, children }) => {
  const timerRef = useRef(null);
  const actionRef = useRef(onAction);

  useEffect(() => { actionRef.current = onAction; }, [onAction]);

  const stopHold = () => {
    if (timerRef.current) { 
        clearInterval(timerRef.current); 
        timerRef.current = null; 
        if (onActionEnd) onActionEnd(); // 長押し終了を通知
    }
  };

  const startHold = (e) => {
    if (e.cancelable) e.preventDefault();
    if (disabled) return;
    
    if (onActionStart) onActionStart(); // 長押し開始を通知し、Reactの同期をロック
    actionRef.current(); 
    stopHold(); 
    timerRef.current = setInterval(() => { actionRef.current(); }, 60); 
  };

  useEffect(() => { return stopHold; }, []);

  return (
    <button 
      onTouchStart={startHold} onTouchEnd={stopHold} onTouchCancel={stopHold} 
      onMouseDown={startHold} onMouseUp={stopHold} onMouseLeave={stopHold} 
      disabled={disabled} className={`${className} touch-none select-none`}
    >
      {children}
    </button>
  );
};

// --- DragDial Component ---
const DragDial = ({ label, value, visualValue, onChange, icon, colorTheme, disabled, stuckLevel, onTryStuck, highlight }) => {
  const valueRef = useRef(value); 
  const isInteracting = useRef(false); // ★ドラッグだけでなくボタン長押しも含めた排他ロック
  const lastX = useRef(0);
  const isStuckWarningTriggered = useRef(false); 
  
  // ★インタラクトしていない時のみ親の値をローカルに同期（ガタつき完全防止）
  if (!isInteracting.current) {
      valueRef.current = value;
  }

  const triggerStuck = () => {
      if (!isStuckWarningTriggered.current) {
          isStuckWarningTriggered.current = true;
          onTryStuck();
          setTimeout(() => { isStuckWarningTriggered.current = false; }, 1000); 
      }
  };

  const handlePointerDown = (e) => {
    if (disabled) return;
    if (stuckLevel && stuckLevel !== 'none') {
        triggerStuck();
        return;
    }
    isInteracting.current = true;
    lastX.current = e.clientX;
    e.currentTarget.setPointerCapture(e.pointerId);
  };

  const handlePointerMove = (e) => {
    if (!isInteracting.current || disabled) return;
    const deltaX = e.clientX - lastX.current;
    
    // 異常なジャンプを弾く安全装置
    if (Math.abs(deltaX) > 80) {
        lastX.current = e.clientX;
        return;
    }
    
    lastX.current = e.clientX;
    
    if (Math.abs(deltaX) > 0) {
        if (stuckLevel && stuckLevel !== 'none') {
            isInteracting.current = false;
            triggerStuck();
            return;
        }
        valueRef.current = Math.max(0, Math.min(100, valueRef.current - deltaX * 0.4)); 
        const roundedNew = Math.round(valueRef.current);
        if (roundedNew !== value) {
            onChange(roundedNew);
        }
    }
  };

  const handlePointerUp = (e) => {
    isInteracting.current = false;
    if (e.currentTarget.hasPointerCapture(e.pointerId)) e.currentTarget.releasePointerCapture(e.pointerId);
    valueRef.current = value;
  };

  // ボタン長押し時のアクション
  const handleHoldAction = (delta) => {
    if (stuckLevel && stuckLevel !== 'none') {
        triggerStuck();
        return;
    }
    const newValue = Math.max(0, Math.min(100, valueRef.current + delta));
    if (newValue !== valueRef.current) {
        valueRef.current = newValue; 
        onChange(newValue);
    }
  };

  const theme = colorTheme === 'blue' ? { border: 'border-blue-400', fill: '#3b82f6', iconColor: 'text-blue-600' } : { border: 'border-red-400', fill: '#ef4444', iconColor: 'text-red-600' };
  
  const bgPositionX = visualValue !== undefined ? visualValue * 10 : value * 10;
  const isStuckWarning = stuckLevel && stuckLevel !== 'none';

  return (
    <div className={`p-4 sm:p-6 rounded-[2rem] border-4 bg-white shadow-md flex flex-col gap-4 transition-opacity ${disabled && !highlight ? 'opacity-50 grayscale pointer-events-none' : theme.border} ${highlight ? 'highlight-target' : ''}`}>
      <div className="flex justify-between items-center px-2">
        <label className={`font-black text-lg sm:text-2xl flex items-center gap-2 sm:gap-3 ${theme.iconColor}`}>
            {icon} {label} {isStuckWarning && <ShieldAlert size={20} className="text-red-500 animate-pulse" />}
        </label>
        <span className="text-xl sm:text-3xl font-mono font-black bg-slate-100 px-4 sm:px-5 py-1 sm:py-2 rounded-2xl border-2 border-slate-300 shadow-inner">{value}%</span>
      </div>
      <div className="w-full h-3 sm:h-4 bg-slate-200 rounded-full overflow-hidden border-2 border-slate-300">
         <div className="h-full bg-slate-600 transition-all duration-75" style={{ width: `${value}%` }}></div>
      </div>
      <div className={`relative w-full h-20 sm:h-24 rounded-3xl overflow-hidden cursor-ew-resize touch-none shadow-[inset_0_4px_15px_rgba(0,0,0,0.3)] border-2 ${isStuckWarning ? 'border-red-500 bg-red-900' : 'border-slate-800 bg-slate-800'} flex items-center justify-center group`} onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerCancel={handlePointerUp} onPointerLeave={handlePointerUp}>
        <div className="absolute inset-0 w-[200%] h-full opacity-80 transition-all duration-75" style={{ backgroundImage: `repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(0,0,0,0.6) 10px, rgba(0,0,0,0.6) 20px)`, backgroundPositionX: `${bgPositionX}px`, backgroundColor: isStuckWarning ? '#7f1d1d' : theme.fill }} />
        <div className="absolute inset-0 bg-gradient-to-b from-white/40 via-transparent to-black/60 pointer-events-none"></div>
        <div className="relative z-10 flex items-center gap-2 sm:gap-3 text-white/90 bg-black/40 px-4 sm:px-6 py-2 rounded-full font-black text-xs sm:text-lg pointer-events-none backdrop-blur-sm shadow-lg border border-white/20">
          <RotateCw size={20} />{isStuckWarning ? '固着しています！' : '左右にこすって回す'}<RotateCcw size={20} />
        </div>
      </div>
      <div className="flex gap-2 sm:gap-4">
        <HoldButton 
            onAction={() => handleHoldAction(-2)} 
            onActionStart={() => { isInteracting.current = true; }} 
            onActionEnd={() => { isInteracting.current = false; valueRef.current = value; }}
            className="flex-1 py-3 sm:py-4 bg-slate-100 hover:bg-slate-200 border-b-[4px] sm:border-b-[6px] border-slate-400 rounded-xl sm:rounded-2xl font-black text-sm sm:text-xl flex flex-col items-center shadow-md active:translate-y-1 active:border-b-2 transition-all">
          <span className="flex items-center gap-1 sm:gap-2 text-slate-800"><RotateCw size={24} strokeWidth={3} /> 閉める</span>
        </HoldButton>
        <HoldButton 
            onAction={() => handleHoldAction(2)} 
            onActionStart={() => { isInteracting.current = true; }} 
            onActionEnd={() => { isInteracting.current = false; valueRef.current = value; }}
            className="flex-1 py-3 sm:py-4 bg-slate-100 hover:bg-slate-200 border-b-[4px] sm:border-b-[6px] border-slate-400 rounded-xl sm:rounded-2xl font-black text-sm sm:text-xl flex flex-col items-center shadow-md active:translate-y-1 active:border-b-2 transition-all">
          <span className="flex items-center gap-1 sm:gap-2 text-slate-800"><RotateCcw size={24} strokeWidth={3} /> 開く</span>
        </HoldButton>
      </div>
    </div>
  );
};

};

// --- Main App ---
const App = () => {
  const [gameState, setGameState] = useState('title');
  const [gameOverInfo, setGameOverInfo] = useState({ reason: '', type: '' });
  
  const [gameMode, setGameMode] = useState('normal');
  const [scenario, setScenario] = useState(null);
  const [emergencyTimer, setEmergencyTimer] = useState(null);
  const [startTime, setStartTime] = useState(null);
  const [timeElapsed, setTimeElapsed] = useState(0);

  const [isCheckedScrew, setIsCheckedScrew] = useState(false);
  const [isHoseConnected, setIsHoseConnected] = useState(false);
  const [waterInAshtray, setWaterInAshtray] = useState(false);
  const [mainValve, setMainValve] = useState(false);
  const [cock, setCock] = useState(false);
  const [gasLevel, setGasLevel] = useState(0); 
  const [airLevel, setAirLevel] = useState(0);
  const [hasMatchInHand, setHasMatchInHand] = useState(false); 
  const [isBurnerLit, setIsBurnerLit] = useState(false);
  const [hasDroppedMatch, setHasDroppedMatch] = useState(false);
  
  const [taskPhase, setTaskPhase] = useState('inspect');
  const [message, setMessage] = useState('');

  // --- 工具と固着システム ---
  const [selectedTool, setSelectedTool] = useState('hand');
  const [stuckState, setStuckState] = useState({ gas: 'none', air: 'none' });
  const [stuckMistakes, setStuckMistakes] = useState(0);

  // ★ 炎の判定を人間工学的に調整 (比率 0.85 ~ 1.15)
  const isFlamePerfect = !hasMatchInHand && isBurnerLit && taskPhase === 'adjust_air' && gasLevel >= 30 && (airLevel / (gasLevel || 1) >= 0.85) && (airLevel / (gasLevel || 1) <= 1.15);

  const isZoomMode = isBurnerLit && !hasMatchInHand && !taskPhase.startsWith('extinguish_cock') && !taskPhase.startsWith('extinguish_main') && !taskPhase.startsWith('cleanup') && !taskPhase.startsWith('emergency');

  const getPhaseGroup = (phase) => {
    if (phase.startsWith('inspect')) return 0;
    if (phase.startsWith('prepare')) return 1;
    if (phase.startsWith('ignite')) return 2;
    if (phase.startsWith('adjust') || phase === 'burning') return 3; 
    if (phase.startsWith('extinguish')) return 4;
    if (phase.startsWith('cleanup')) return 5;
    if (phase.startsWith('emergency')) return -1;
    return 0;
  };

  const resetGame = (mode) => {
    setIsCheckedScrew(false); setIsHoseConnected(false); setWaterInAshtray(false);
    setMainValve(false); setCock(false); setHasMatchInHand(false); setIsBurnerLit(false);
    setHasDroppedMatch(false); setEmergencyTimer(null); 
    
    setSelectedTool('hand');
    setStuckState({ gas: 'none', air: 'none' });
    setStuckMistakes(0);

    if (mode === 'trouble') {
      const rand = Math.random();
      if (rand < 0.33) {
        setScenario('forgot_screw'); setGasLevel(60); setAirLevel(40);
        setTaskPhase('inspect');
        setMessage('【異常発生】前の班がねじを開けたまま片付けたようです。ドラムを回して0%に閉めてください。');
      } else if (rand < 0.66) {
        setScenario('wind'); setGasLevel(15); setAirLevel(10);
        setTaskPhase('inspect');
        setMessage('【警告】今日は窓からの突風に注意してください。まずはねじを回して0%に閉めて点検してください。');
      } else {
        setScenario('stuck_screw'); setGasLevel(8); setAirLevel(5);
        setStuckState({ gas: 'hard', air: 'light' });
        setTaskPhase('inspect');
        setMessage('【異常発生】ねじが少し開いたまま固着しています！このままではガス漏れの危険があるため0%に閉めたいですが、素手では回りません。道具箱から適切な道具を選んで緩めてください。');
      }
    } else {
      setScenario(null); 
      setGasLevel(12); setAirLevel(18); 
      setTaskPhase('inspect');
      setMessage('【点検】調整ねじを軽く閉める：ガスねじと空気ねじをドラムで回して、両方とも「0%（全閉）」にしてください。');
    }
    setStartTime(Date.now());
  };

  const startGame = (mode) => { setGameMode(mode); resetGame(mode); setGameState('playing'); };
  
  const triggerGameOver = (reason, type) => { 
    setGameOverInfo({ reason, type }); 
    setGameState('gameover'); 
  };

  const handleTryStuck = (screwType) => {
    const level = stuckState[screwType];
    const screwName = screwType === 'gas' ? 'ガス調節ねじ' : '空気調節ねじ';

    if (level === 'none') return;

    if (level === 'light' && (selectedTool === 'cloth' || selectedTool === 'pliers')) {
        setStuckState(prev => ({...prev, [screwType]: 'none'}));
        setMessage(`【固着解除】${selectedTool === 'cloth' ? '雑巾' : 'ペンチ'}を使って、${screwName}の固着を解除しました！`);
        return;
    }
    if (level === 'hard' && selectedTool === 'pliers') {
        setStuckState(prev => ({...prev, [screwType]: 'none'}));
        setMessage(`【固着解除】ペンチを使って、固く締まった${screwName}の固着を解除しました！`);
        return;
    }

    if (selectedTool === 'hand') {
        const nextMistakes = stuckMistakes + 1;
        setStuckMistakes(nextMistakes);
        if (nextMistakes >= 3) {
            triggerGameOver("【器具破損】固いねじを素手で力任せに回し続けたため、ねじ山が潰れてバーナーが壊れてしまいました！適切な道具を使いましょう。", "procedure");
        } else {
            setMessage(`【警告】${screwName}が固くて素手では回りません！力任せに回すと壊れます。道具箱から適切な道具を選んでください。`);
        }
    } else if (level === 'hard' && selectedTool === 'cloth') {
        setMessage(`【警告】固すぎて雑巾では滑ってしまいます。もっと強力な道具が必要です。`);
    }
  };

  // --- Logic Handlers ---
  
  useEffect(() => {
    if (taskPhase === 'inspect' && gasLevel === 0 && airLevel === 0 && !isCheckedScrew) {
      if (stuckState.gas !== 'none' || stuckState.air !== 'none') return; 
      setIsCheckedScrew(true);
      setTaskPhase('prepare_water');
      setMessage('【点検完了】ねじヨシ。次に、燃えかす入れに水を入れてください。');
    }
  }, [gasLevel, airLevel, taskPhase, isCheckedScrew, stuckState]);


  const handleWaterOrDisposeMatch = () => {
    if (gameState !== 'playing') return;
    
    if (hasMatchInHand) {
      setHasMatchInHand(false);
      setHasDroppedMatch(true); 
      if (isBurnerLit) {
        setTaskPhase('adjust_gas');
        setMessage('【炎の調整モード】マッチを捨てました。ガス調節ねじをさらに回して、火の大きさを適切（30%以上）に整えてください。');
      } else {
        setMessage('【点火】マッチを水に捨てました。必要ならもう一度マッチを擦ってください。');
      }
      return;
    }

    if (taskPhase !== 'prepare_water') {
      if (taskPhase === 'inspect') return triggerGameOver("【手順違反】ねじの点検が済んでいません。", "procedure");
      return setMessage('今はその作業のタイミングではありません。');
    }
    setWaterInAshtray(true); 
    setTaskPhase('prepare_hose');
    setMessage('【準備】水ヨシ。次に、ゴム管を元栓に接続してください。');
  };

  const handleHose = () => {
    if (gameState !== 'playing') return;
    
    if (!isHoseConnected) {
        if (taskPhase === 'prepare_water') return triggerGameOver("【手順違反】ゴム管を繋ぐ前に、燃えかす入れに水を入れてください！", "procedure");
        if (gasLevel > 0 || airLevel > 0) return triggerGameOver("【大事故】ねじが開いたままゴム管を接続しました！生ガスが室内に漏れ出します！", "gasLeak");
        if (!isCheckedScrew) return triggerGameOver("【手順違反】ねじが0%か点検せずに管を接続しました。ガス漏れの危険があります！", "procedure");
        
        setIsHoseConnected(true); 
        setTaskPhase('ignite_main');
        setMessage('【接続完了】次に、元栓を開いてください（配管と平行）。');
    } else {
        if (!taskPhase.startsWith('cleanup') && taskPhase !== 'emergency_safe') return triggerGameOver("【手順違反】不適切なタイミングでゴム管を抜きました。", "procedure");
        if (mainValve || cock) return triggerGameOver("【大事故】元栓やコックが開いたまま管を抜きました！ガスが室内に充満します！", "gasLeak");
        setIsHoseConnected(false);
        setTaskPhase('cleanup_screw');
        setMessage('【片付け】管を抜きました。最後に、次回固着しないよう両方のねじを「少し開けて（緩めて）」から完了ボタンを押してください。');
    }
  };

  const handleMainValve = () => {
    if (gameState !== 'playing') return;
    
    if (!mainValve) {
      if (taskPhase.startsWith('extinguish') || taskPhase.startsWith('cleanup') || taskPhase === 'burning') return triggerGameOver("【重大な手順違反】消火・片付け・実験中に元栓を開けました！生ガスが漏れ出し大変危険です！", "gasLeak");
      if (!isHoseConnected) return triggerGameOver("【大事故】ゴム管を接続せずに元栓を開けました！生ガスが室内に充満します！", "gasLeak");
      if (taskPhase === 'prepare_water' || taskPhase === 'prepare_hose') return triggerGameOver("【手順違反】準備が完了する前に元栓を開けました。", "procedure");
      
      setMainValve(true); 
      setTaskPhase('ignite_cock');
      setMessage('【点火】元栓を開きました。次にコックを開いてください。');
    } else {
      if (taskPhase === 'extinguish_main') {
        setMainValve(false); 
        setTaskPhase('cleanup_hose');
        setMessage('【片付け】元栓を閉めました。ゴム管を元栓から抜いてください。');
      } else if (taskPhase === 'emergency' || taskPhase === 'emergency_safe') {
        setMainValve(false);
      } else { triggerGameOver("【手順違反】作業中に元栓を閉めました。危険な操作です。", "procedure"); }
    }
  };

  const handleCock = () => {
    if (gameState !== 'playing') return;

    if (!cock) {
      if (taskPhase.startsWith('extinguish') || taskPhase.startsWith('cleanup') || taskPhase === 'burning') return triggerGameOver("【重大な手順違反】消火・片付け・実験中にコックを開けました！生ガスが漏れ出し大変危険です！", "gasLeak");
      if (!mainValve) return triggerGameOver("【手順違反】元栓より先にコックを開きました。", "procedure");
      
      setCock(true); 
      setTaskPhase('ignite_match');
      setMessage('【点火】コックを開きました。マッチに火をつけて下から近づけてください。');
    } else {
      if (taskPhase === 'extinguish_cock') {
        if (isBurnerLit || gasLevel > 0) return triggerGameOver("【危険】火がついたままコックを閉めました。必ずガスねじから順番に消火してください！", "backfire");
        setCock(false); 
        setTaskPhase('extinguish_main');
        setMessage('【消火】コックを閉めました（垂直）。次に元栓を閉めてください。');
      } else if (taskPhase === 'emergency' || taskPhase === 'emergency_safe') {
        setCock(false);
      } else { triggerGameOver("【手順違反】不適切なタイミングでコックを閉めました。", "procedure"); }
    }
  };

  const handleMatch = () => {
    if (gameState !== 'playing' || isBurnerLit) return;
    if (!waterInAshtray) return triggerGameOver("【火災の危険】燃えかす入れに水を入れずにマッチを使いました！", "fire");
    if (!taskPhase.startsWith('ignite')) return setMessage('今はマッチを使う必要はありません。');
    if (!isHoseConnected) return triggerGameOver("【手順違反】ゴム管が繋がっていない状態でマッチを使いました。", "procedure");
    if (!mainValve || !cock) return triggerGameOver("【手順違反】元栓やコックが開いていない状態でマッチを使いました。ガスが来ません。", "procedure");
    if (airLevel > 0) return triggerGameOver("【爆発の危険】空気調節ねじが開いたまま点火しようとしました。内部で爆発（逆火）します！", "explosion");
    if (gasLevel > 0) return triggerGameOver("【爆発の危険】ガスを出した状態でマッチを使いました。溜まったガスに引火し爆発します！", "explosion");

    setHasMatchInHand(true);
    setHasDroppedMatch(false);
    setTaskPhase('ignite_gas');
    setMessage('【点火】マッチに火がつきました。ガス調節ねじを反時計回りに回して点火してください。');
  };

  const updateGas = (newVal) => {
    if (gameState !== 'playing') return;
    if (taskPhase === 'burning') return setMessage('【警告】現在は実験中です。ねじの操作は不要です。終了したら下のボタンを押してください。');

    if (newVal > gasLevel) { 
      if (taskPhase === 'inspect') {
          return setMessage('【警告】今は点検中です。ねじは「0%に閉める」方向（右）に回してください！');
      }

      if (taskPhase.startsWith('extinguish')) {
          return setMessage("【警告】消火手順中です。ねじを開けないでください。閉める方向（右）に回してください。");
      }
      
      if (!isHoseConnected && !taskPhase.startsWith('inspect') && !taskPhase.startsWith('cleanup') && !taskPhase.startsWith('emergency')) {
         setGasLevel(newVal); return setMessage('管が繋がっていないのでガスは出ませんが、不適切な操作です。');
      }
      if (!hasMatchInHand && !isBurnerLit && !taskPhase.startsWith('inspect') && !taskPhase.startsWith('cleanup') && !taskPhase.startsWith('emergency')) {
        return triggerGameOver("【ガス漏れ】マッチをつける前にガス調節ねじを開きました。爆発の危険があります！", "gasLeak");
      }
      
      if (hasMatchInHand && !isBurnerLit && newVal > 0) {
        if (isHoseConnected && mainValve && cock) {
          setIsBurnerLit(true);
          setTaskPhase('adjust_match');
          setMessage('点火成功！【重要】火のついたマッチを持ったままです！火の大きさを整えたら、燃えかす入れをタップしてマッチを捨ててください。');
        }
      }
    }
    
    if (newVal < gasLevel) {
      if (hasMatchInHand && isBurnerLit) {
          return triggerGameOver("【火災の危険】火のついたマッチを持ったままガスねじを閉めようとしました！衣服に引火する危険があります。まずはマッチを捨ててください！", "fire");
      }

      // 修正: 消火フェーズやガスを0にする時のみバックファイアを厳格判定（微調整での理不尽死を防ぐ）
      if (airLevel > 0 && isBurnerLit) {
          if (newVal === 0 || taskPhase.startsWith('extinguish')) {
              return triggerGameOver("【逆火の危険】空気調節ねじが開いたままガスを絞ろうとしました！炎が内部に入り込み大変危険です！必ず先に空気を0にして炎を赤くしてください。", "backfire");
          }
      }

      if (newVal === 0 && isBurnerLit) {
          setIsBurnerLit(false); 
          if (taskPhase === 'extinguish_gas' || taskPhase.startsWith('emergency')) {
              setTaskPhase('extinguish_cock');
              setMessage('【消火】火が消え、全体画面に戻りました。コックを閉めてください（垂直にする）。');
          } else {
              return triggerGameOver("【ガス漏れ】不適切なタイミングで火を消してしまいました。元栓とコックが開いたままで生ガスが漏れ出しています！", "gasLeak");
          }
      }
    }
    setGasLevel(newVal);
  };

  const updateAir = (newVal) => {
    if (gameState !== 'playing') return;
    if (taskPhase === 'burning') return setMessage('【警告】現在は実験中です。ねじの操作は不要です。終了したら下のボタンを押してください。');
    
    if (newVal > airLevel) {
        if (taskPhase === 'inspect') {
            return setMessage('【警告】今は点検中です。ねじは「0%に閉める」方向（右）に回してください！');
        }

        if (hasMatchInHand && isBurnerLit) {
           return triggerGameOver("【火災の危険】火のついたマッチを持ったまま上部の空気ねじを操作しようとしました！衣服への引火の危険があります。先にマッチを捨ててください！", "fire");
        }

        if (taskPhase.startsWith('prepare') || taskPhase.startsWith('ignite')) {
            return triggerGameOver("【爆発の危険】点火前に空気調節ねじを開きました。着火時に内部で爆発する恐れがあります！", "explosion");
        }
        if (taskPhase === 'adjust_gas' && gasLevel < 30) {
            return triggerGameOver("【手順違反】炎の大きさが不十分なまま空気を混ぜると逆火の危険があります。先にガス調節ねじで炎の大きさを適切にしてください。", "procedure");
        }
        if (taskPhase.startsWith('extinguish')) {
            return setMessage("【警告】消火手順中です。ねじを開けないでください。閉める方向（右）に回してください。");
        }
    }

    if (taskPhase.startsWith('extinguish') && newVal === 0 && gasLevel > 0) {
        setTaskPhase('extinguish_gas');
        setMessage('【消火】空気調節ねじを完全に閉めました。次にガス調節ねじを時計回りに完全に閉めて消火してください。');
    }
    setAirLevel(newVal);
  };

  useEffect(() => {
    if (taskPhase === 'adjust_gas' && gasLevel >= 30) {
      setTaskPhase('adjust_air');
      setMessage('【調節】火の大きさが適切になりました。空気調節ねじを開いて、内炎の三角形が見える青い炎に調節してください。');
    } else if (taskPhase === 'adjust_air' && gasLevel < 30) {
      setTaskPhase('adjust_gas');
      setMessage('【警告】火が小さすぎます。ガス調節ねじで火の大きさを適切にしてください。');
    }
  }, [gasLevel, taskPhase]);


  // ★ 0.5秒で即座に安定フェーズに移行
  useEffect(() => {
    let timer;
    if (isFlamePerfect && gameState === 'playing') {
      timer = setTimeout(() => {
        if (gameMode === 'trouble' && scenario === 'wind') {
          setIsBurnerLit(false); setTaskPhase('emergency'); setEmergencyTimer(10);
          setMessage('【緊急事態】実験中、窓からの突風で火が消えました！！生ガスが出続けています！10秒以内にガスをすべて止めてください！');
        } else {
          setTaskPhase('burning');
          setMessage('【着火完了】素晴らしい！青い炎が安定しました。実験が終わったら「消火手順へ進む」を押してください。');
        }
      }, 500); 
    }
    return () => clearTimeout(timer);
  }, [isFlamePerfect, gameMode, scenario, gameState]);


  useEffect(() => {
    let timerId;
    if (taskPhase === 'emergency' && emergencyTimer > 0 && gameState === 'playing') {
      timerId = setTimeout(() => setEmergencyTimer(prev => prev - 1), 1000);
    } else if (taskPhase === 'emergency' && emergencyTimer === 0 && gameState === 'playing') {
      triggerGameOver("【大惨事】火が消えた後、ガスを止めるのが遅れました。室内に充満したガスに引火し大爆発しました！", "explosion");
    }
    return () => clearTimeout(timerId);
  }, [taskPhase, emergencyTimer, gameState]);

  useEffect(() => {
    if (taskPhase === 'emergency') {
      if (!cock || !mainValve || gasLevel === 0) {
        setTaskPhase('emergency_safe'); 
        setEmergencyTimer(null);
        setMessage('【緊急事態回避】素晴らしい判断です！ガスの供給を遮断し被害を防ぎました。落ち着いて残りのねじや栓を全て閉めてください。');
      }
    } else if (taskPhase === 'emergency_safe') {
      if (!cock && !mainValve && gasLevel === 0 && airLevel === 0 && isHoseConnected) {
        setTaskPhase('cleanup_hose');
        setMessage('【片付け】すべて閉まり安全が確保されました。ゴム管を元栓から抜いてください。');
      }
    }
  }, [gasLevel, airLevel, cock, mainValve, taskPhase, isHoseConnected]);

  const handleFinish = () => {
      if (!taskPhase.startsWith('cleanup') || isHoseConnected) return setMessage('まだ片付けが終わっていません。');
      
      if (gasLevel === 0 || airLevel === 0) return setMessage('⚠️ 注意：ねじを0%のまま保管すると次回固着します。両方少し開けてください。');
      if (gasLevel > 15 || airLevel > 15) return setMessage('⚠️ 注意：ねじを開けすぎです。次回使う人が危険なので、2〜10%程度だけ軽く開けてください。');

      setTimeElapsed(Math.floor((Date.now() - startTime) / 1000));
      setGameState('result'); 
  };

  const renderSvgSimulator = () => {
    const hFlame = Math.max(0, gasLevel * 2.8); 
    const ratio = gasLevel > 0 ? airLevel / gasLevel : 0;
    
    let outerColor = "rgba(255, 120, 0, 0.9)"; let innerColor = "rgba(255, 220, 100, 0.9)";
    let flameWidth = 26; 
    
    if (gasLevel >= 30 && ratio >= 0.85 && ratio <= 1.15) {
      outerColor = "rgba(100, 150, 255, 0.8)"; innerColor = "rgba(180, 240, 255, 0.95)";
      flameWidth = 20; 
    } else if (ratio > 1.15) {
      outerColor = "rgba(50, 50, 255, 0.6)"; innerColor = "rgba(150, 150, 255, 0.8)";
      flameWidth = 16; 
    } else if (ratio > 0.3 && ratio < 0.85) {
      outerColor = "rgba(200, 80, 255, 0.8)"; innerColor = "rgba(150, 200, 255, 0.9)"; flameWidth = 24;
    }

    const gasY = gasLevel * -0.3; 
    const airY = airLevel * -0.3; 
    const totalY = gasY + airY;

    return (
      <svg viewBox="0 -200 300 750" className="w-auto h-full max-w-full drop-shadow-2xl overflow-visible">
        <defs>
          <linearGradient id="metalBurner" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stopColor="#94a3b8" /><stop offset="50%" stopColor="#f8fafc" /><stop offset="100%" stopColor="#475569" />
          </linearGradient>
          <linearGradient id="hoseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stopColor="#fdba74" /><stop offset="50%" stopColor="#f97316" /><stop offset="100%" stopColor="#c2410c" />
          </linearGradient>
          <pattern id="knurl" patternUnits="userSpaceOnUse" width="10" height="30">
            <line x1="0" y1="0" x2="0" y2="30" stroke="#000" strokeWidth="3" opacity="0.4"/>
          </pattern>
        </defs>

        {!isHoseConnected && (
          <path d="M 220 650 Q 230 550, 250 650" fill="none" stroke="url(#hoseGrad)" strokeWidth="20" strokeLinecap="round" opacity="0.4" />
        )}

        <g transform="translate(0, 10)">
          <polygon points="120,450 135,460 90,510 50,490" fill="#334155" />
          <polygon points="135,460 165,460 210,510 90,510" fill="#1e293b" />
          <polygon points="165,460 180,450 250,490 210,510" fill="#0f172a" />
          <polygon points="50,490 90,510 210,510 250,490 250,500 210,520 90,520 50,500" fill="#020617" />
          <line x1="90" y1="510" x2="135" y2="460" stroke="#0f172a" strokeWidth="2" opacity="0.5"/>
          <line x1="210" y1="510" x2="165" y2="460" stroke="#0f172a" strokeWidth="2" opacity="0.5"/>
        </g>

        <rect x="135" y="430" width="30" height="40" fill="url(#metalBurner)" />
        <ellipse cx="150" cy="470" rx="15" ry="5" fill="#475569" />

        <g transform="translate(0, 0)">
           <path d="M 160 450 L 210 450 L 210 460 L 160 460 Z" fill="#d97706" />
           <rect x="200" y="448" width="10" height="14" rx="2" fill="#b45309" />
        </g>
        
        {isHoseConnected && (
          <g>
            <path d="M 210 455 Q 260 455, 280 650" fill="none" stroke="url(#hoseGrad)" strokeWidth="20" strokeLinecap="round" />
            <path d="M 210 455 Q 260 455, 280 650" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" opacity="0.3" transform="translate(0, -7)"/>
            <g transform="translate(202, 447) rotate(-15)">
              <rect x="0" y="0" width="10" height="22" rx="2" fill="#94a3b8" />
              <rect x="2" y="2" width="6" height="18" fill="#cbd5e1" />
              <circle cx="5" cy="11" r="2" fill="#475569" />
            </g>
          </g>
        )}

        <g transform={`translate(0, ${gasY})`}>
          <rect x="142" y="380" width="16" height="60" fill="#d97706" stroke="#78350f" strokeWidth="1" />
          <g transform="translate(115, 410)">
            <rect x="0" y="0" width="70" height="30" rx="4" fill="#ef4444" stroke="#0f172a" strokeWidth="3"/>
            <rect x="0" y="0" width="70" height="30" rx="4" fill="url(#knurl)" transform={`translate(${(gasLevel * 2) % 10}, 0)`}/>
          </g>
        </g>

        <g transform={`translate(0, ${totalY})`}>
          <ellipse cx="150" cy="150" rx="15" ry="5" fill="#cbd5e1" stroke="#1e293b" strokeWidth="3"/>
          
          {isBurnerLit && hFlame > 0 && (
            <g transform="translate(150, 150)">
                {/* opacity描画でGPU負荷を徹底排除 */}
                <path d={`M -${flameWidth} 0 C -${flameWidth} -${hFlame*0.5}, 0 -${hFlame*0.8}, 0 -${hFlame} C 0 -${hFlame*0.8}, ${flameWidth} -${hFlame*0.5}, ${flameWidth} 0 Z`} fill={outerColor} opacity="0.8" className={ratio > 1.15 ? "animate-shake" : "animate-flicker"} />
                {isFlamePerfect ? <path d={`M -6 0 L 0 -${hFlame*0.4} L 6 0 Z`} fill={innerColor} opacity="0.9" /> : <path d={`M -${flameWidth*0.7} 0 Q 0 -${hFlame*0.6}, ${flameWidth*0.7} 0 Z`} fill={innerColor} opacity="0.8" className={ratio > 1.15 ? "animate-shake" : "animate-flicker"} />}
            </g>
          )}

          <path d="M 135 150 L 135 380 L 165 380 L 165 150 Z" fill="url(#metalBurner)" stroke="#1e293b" strokeWidth="3"/>
          <path d="M 135 150 A 15 5 0 0 0 165 150" fill="none" stroke="#1e293b" strokeWidth="3" />

          <g transform="translate(115, 380)">
            <rect x="0" y="0" width="70" height="30" rx="4" fill="#3b82f6" stroke="#0f172a" strokeWidth="3"/>
            <rect x="0" y="0" width="70" height="30" rx="4" fill="url(#knurl)" transform={`translate(${((airLevel + gasLevel) * 2) % 10}, 0)`}/>
          </g>
        </g>

        {hasMatchInHand && (
          <g transform={isBurnerLit ? "translate(190, 150) rotate(-5)" : "translate(180, 140) rotate(-15)"}>
            <rect x="0" y="0" width="70" height="6" fill="#78350f" rx="3" />
            <circle cx="5" cy="3" r="16" fill="#f97316" opacity="0.4" className="animate-opacity-flicker" />
            <circle cx="5" cy="3" r="10" fill="#f97316" opacity="0.7" className="animate-opacity-flicker" />
            <circle cx="5" cy="3" r="6" fill="#fef08a" />
          </g>
        )}
      </svg>
    );
  };

  if (gameState === 'title') return <TitleScreen onStart={startGame} onTutorial={() => setGameState('tutorial')} />;
  if (gameState === 'tutorial') return <TutorialScreen onBack={() => setGameState('title')} />;
  if (gameState === 'gameover') return <GameOverScreen reason={gameOverInfo.reason} errorType={gameOverInfo.type} onRetry={() => setGameState('title')} />;
  if (gameState === 'result') return <ResultScreen timeElapsed={timeElapsed} gameMode={gameMode} onRetry={() => setGameState('title')} />;

  return (
    <div className="flex flex-col lg:flex-row h-[100dvh] w-full bg-slate-200 text-slate-800 font-sans overflow-hidden px-2 py-2 sm:p-0">
        
        <div className="w-full lg:w-1/2 h-[45dvh] lg:h-[100dvh] bg-slate-900 relative flex flex-col items-center justify-end shrink-0 shadow-[inset_0_-10px_30px_rgba(0,0,0,0.7)] z-10 overflow-hidden rounded-t-2xl sm:rounded-none">
          
          <div className={`absolute top-2 sm:top-6 left-2 sm:left-6 right-2 sm:right-6 p-3 sm:p-5 rounded-3xl shadow-2xl border-l-[8px] sm:border-l-[12px] z-30 transition-colors ${taskPhase.startsWith('emergency') ? 'bg-red-950 border-red-500' : 'bg-white border-blue-500'}`}>
            <p className={`font-black text-xs sm:text-lg leading-relaxed flex items-start gap-2 sm:gap-3 ${taskPhase.startsWith('emergency') ? 'text-red-200' : 'text-slate-800'}`}>
              {taskPhase.startsWith('emergency') ? <AlertTriangle className="shrink-0 text-red-500 mt-1 animate-pulse" size={24} /> : <Info className="shrink-0 text-blue-500 mt-1" size={24} />}
              <span>{message}</span>
            </p>
          </div>

          {taskPhase === 'emergency' && (
            <div className="absolute inset-0 bg-red-950/70 z-40 flex items-center justify-center pointer-events-none">
               <div className="text-[12rem] font-black text-red-500 drop-shadow-[0_0_40px_rgba(220,38,38,1)] animate-ping">{emergencyTimer}</div>
            </div>
          )}

          {/* ★修正: 見切れない安全な起点(50% 70%)と倍率(1.15)によるズーム */}
          <div className="relative w-full max-w-[400px] h-full flex-shrink-0 flex items-end justify-center pb-2 sm:pb-8 transition-transform duration-1000 ease-out" 
               style={{ 
                   transformOrigin: '50% 70%', 
                   transform: isZoomMode ? 'scale(1.15) translateY(5%)' : 'scale(1) translateY(0)' 
               }}>
             {renderSvgSimulator()}
          </div>

          <div 
            onClick={hasMatchInHand ? handleWaterOrDisposeMatch : undefined}
            className={`absolute bottom-2 sm:bottom-6 left-2 sm:left-6 z-10 flex flex-col items-center transition-all duration-700 ${hasMatchInHand ? 'cursor-pointer hover:scale-110 animate-pulse' : ''} ${isZoomMode ? 'translate-y-32 opacity-0 pointer-events-none' : 'translate-y-0 opacity-100'}`}
          >
            <div className={`w-16 h-12 sm:w-28 sm:h-20 bg-slate-300 rounded-b-xl sm:rounded-b-2xl border-4 relative overflow-hidden shadow-2xl ${hasMatchInHand && isBurnerLit ? 'border-rose-500 shadow-[0_0_20px_rgba(244,63,94,0.6)]' : 'border-slate-500'} ${['prepare_water', 'adjust_match'].includes(taskPhase) ? 'highlight-target' : ''}`}>
              <div className="w-full h-2 sm:h-3 bg-slate-600 absolute top-0 z-20"></div>
              
              {hasDroppedMatch && (
                <div className="absolute bottom-2 left-1/2 transform -translate-x-1/2 rotate-15 animate-drop z-10">
                  <div className="w-10 sm:w-14 h-1.5 sm:h-2 bg-amber-900 rounded-full relative">
                    <div className="absolute -left-1 sm:-left-1.5 -top-0.5 sm:-top-1 w-3 h-3 sm:w-4 sm:h-4 bg-black rounded-full"></div>
                  </div>
                </div>
              )}

              {waterInAshtray && <div className="absolute bottom-0 w-full h-[55%] bg-blue-500/90 border-t-4 border-blue-300 z-30"></div>}
            </div>
            <span className={`text-white font-black text-[10px] sm:text-sm mt-1 sm:mt-2 px-2 sm:px-4 py-1 sm:py-1.5 rounded-full shadow-lg border tracking-widest ${hasMatchInHand && isBurnerLit ? 'bg-rose-600 border-rose-400' : 'bg-slate-800 border-slate-600'}`}>
              {hasMatchInHand && isBurnerLit ? 'タップして捨てる' : '燃えかす入れ'}
            </span>
          </div>
        </div>

        <div className={`w-full lg:w-1/2 h-[55dvh] lg:h-[100dvh] bg-slate-100 p-4 sm:p-8 overflow-y-auto shadow-2xl z-20 hide-scrollbar border-l-8 ${taskPhase.startsWith('emergency') ? 'border-red-500' : 'border-slate-300'} rounded-b-2xl sm:rounded-none`}>
          
          <div className="flex flex-col xl:flex-row justify-between items-start xl:items-end border-b-4 border-slate-300 pb-3 sm:pb-4 mb-4 sm:mb-6 gap-3 sm:gap-4">
            <h2 className="text-xl sm:text-4xl font-black text-slate-800 tracking-wider">操作パネル</h2>
            <div className="flex flex-wrap gap-1 sm:gap-2">
              {['inspect', 'prepare', 'ignite', 'adjust', 'extinguish', 'cleanup'].map((p, i) => {
                const labels = ['1.点検', '2.準備', '3.点火', '4.調節', '5.消火', '6.片付'];
                const groupIndex = getPhaseGroup(taskPhase);
                const isActive = groupIndex === i || (taskPhase.startsWith('emergency') && i === 4);
                const isPast = groupIndex > i && !taskPhase.startsWith('emergency');
                return (
                  <span key={p} className={`px-2 sm:px-3 py-1 sm:py-1.5 text-[10px] sm:text-sm font-black rounded-lg border-2 shadow-sm transition-colors ${isActive ? 'bg-blue-600 text-white border-blue-700' : isPast ? 'bg-slate-300 text-slate-500 border-slate-400' : 'bg-slate-200 text-slate-400 border-slate-300 opacity-50'}`}>
                    {labels[i]}
                  </span>
                );
              })}
            </div>
          </div>

          <div className="max-w-2xl mx-auto pb-16 relative mx-2 sm:mx-4">
            
            {gameMode === 'trouble' && (
                <div className="bg-slate-200 p-3 sm:p-4 rounded-2xl mb-6 border-4 border-slate-300 shadow-inner flex flex-col gap-2">
                    <h3 className="font-black text-slate-700 text-sm sm:text-base flex items-center gap-2"><Wrench size={18}/> 道具箱</h3>
                    <div className="flex gap-2">
                        <button onClick={() => setSelectedTool('hand')} className={`flex-1 py-2 rounded-xl font-bold flex flex-col items-center gap-1 border-b-4 transition-all ${selectedTool === 'hand' ? 'bg-amber-200 border-amber-500 text-amber-900 translate-y-1 border-b-0 shadow-inner' : 'bg-white border-slate-400 text-slate-600 hover:bg-slate-50 shadow-md'}`}>
                            <Hand size={24} />素手
                        </button>
                        <button onClick={() => setSelectedTool('cloth')} className={`flex-1 py-2 rounded-xl font-bold flex flex-col items-center gap-1 border-b-4 transition-all ${selectedTool === 'cloth' ? 'bg-amber-200 border-amber-500 text-amber-900 translate-y-1 border-b-0 shadow-inner' : 'bg-white border-slate-400 text-slate-600 hover:bg-slate-50 shadow-md'}`}>
                            <Eraser size={24} />雑巾
                        </button>
                        <button onClick={() => setSelectedTool('pliers')} className={`flex-1 py-2 rounded-xl font-bold flex flex-col items-center gap-1 border-b-4 transition-all ${selectedTool === 'pliers' ? 'bg-amber-200 border-amber-500 text-amber-900 translate-y-1 border-b-0 shadow-inner' : 'bg-white border-slate-400 text-slate-600 hover:bg-slate-50 shadow-md'}`}>
                            <Wrench size={24} />ペンチ
                        </button>
                    </div>
                </div>
            )}

            {isZoomMode ? (
              <div className="space-y-6 sm:space-y-8 animate-in fade-in slide-in-from-bottom-8 duration-700">
                <div className={`bg-blue-50 border-4 border-blue-300 p-4 sm:p-6 rounded-3xl shadow-sm text-center transition-all ${taskPhase === 'burning' ? 'ring-4 ring-orange-400 ring-offset-2 bg-orange-50 border-orange-300' : ''}`}>
                  <h3 className="text-xl sm:text-2xl font-black text-blue-800 mb-2 flex items-center justify-center gap-2">
                    <FlameIcon className={`${taskPhase === 'burning' ? 'text-orange-500 animate-pulse' : 'text-red-500'}`}/> 
                    {taskPhase === 'burning' ? '🔥 実験中...' : '炎の調整専用モード'}
                  </h3>
                  <p className="text-sm sm:text-lg font-bold text-slate-700 whitespace-pre-line">
                    {taskPhase === 'burning' 
                      ? '青い炎が安定しています。バーナーを使った実験を行っています...\n実験が終了したら下のボタンを押してください。'
                      : 'ガスねじで大きさを、空気ねじで色を調整します。\n消火する時は、空気を0にして炎を赤くし、ガスを0にして火を消します。'}
                  </p>
                </div>
                
                <DragDial 
                    label="空気調節ねじ(上)" value={airLevel} visualValue={airLevel + gasLevel} onChange={updateAir} icon={<Wind className="w-6 h-6 sm:w-8 sm:h-8" />} colorTheme="blue" 
                    disabled={taskPhase === 'burning'} stuckLevel={stuckState.air} onTryStuck={() => handleTryStuck('air')} 
                    highlight={['inspect', 'adjust_air', 'extinguish_air', 'cleanup_screw'].includes(taskPhase)} 
                />
                <DragDial 
                    label="ガス調節ねじ(下)" value={gasLevel} visualValue={gasLevel} onChange={updateGas} icon={<FlameIcon className="w-6 h-6 sm:w-8 sm:h-8" />} colorTheme="red" 
                    disabled={taskPhase === 'burning'} stuckLevel={stuckState.gas} onTryStuck={() => handleTryStuck('gas')} 
                    highlight={['inspect', 'ignite_gas', 'adjust_gas', 'adjust_match', 'extinguish_gas', 'cleanup_screw'].includes(taskPhase)} 
                />
                
                {taskPhase === 'burning' && (
                    <button onClick={() => {
                        setTaskPhase('extinguish_air');
                        setMessage('【消火手順】実験が終了しました。まずは「空気調節ねじ(上)」を完全に閉めてください。');
                    }} className="w-full py-4 sm:py-6 mt-4 bg-orange-600 hover:bg-orange-500 text-white rounded-2xl font-black text-xl sm:text-2xl shadow-xl flex items-center justify-center gap-2 sm:gap-3 border-b-4 sm:border-b-[6px] border-orange-800 active:translate-y-2 active:border-b-0 transition-all highlight-target">
                        <FlameIcon className="w-6 h-6 sm:w-8 sm:h-8" strokeWidth={3} /> 実験終了：消火手順へ進む
                    </button>
                )}
              </div>
            ) : (
              <div className="space-y-4 sm:space-y-8 animate-in fade-in duration-500 mx-2 sm:mx-4">
                <div className="grid grid-cols-2 gap-3 sm:gap-5">
                    <div className={`p-3 sm:p-6 rounded-2xl sm:rounded-[2rem] font-black text-xs sm:text-xl flex flex-col items-center justify-center gap-1 sm:gap-3 border-4 transition-all shadow-sm ${isCheckedScrew || taskPhase.startsWith('emergency') ? 'bg-slate-200 text-slate-500 border-slate-300' : 'bg-yellow-50 border-yellow-400 text-yellow-800'}`}>
                        <Wrench className="w-6 h-6 sm:w-8 sm:h-8" /> {isCheckedScrew ? 'ねじ点検済' : 'ドラムを回して0%に'}
                    </div>
                    <button onClick={handleWaterOrDisposeMatch} disabled={(waterInAshtray && !(hasMatchInHand && isBurnerLit)) || taskPhase.startsWith('emergency') || taskPhase.startsWith('inspect')} className={`p-3 sm:p-6 rounded-2xl sm:rounded-[2rem] font-black text-xs sm:text-xl flex flex-col items-center gap-1 sm:gap-3 border-b-4 sm:border-b-[6px] transition-all shadow-sm ${hasMatchInHand && isBurnerLit ? 'bg-rose-100 border-rose-500 text-rose-900 animate-pulse hover:bg-rose-200 active:translate-y-1 active:border-b-[2px]' : waterInAshtray || taskPhase.startsWith('emergency') || taskPhase.startsWith('inspect') ? 'bg-slate-200 text-slate-500 border-slate-300' : 'bg-white border-slate-400 text-slate-800 hover:bg-slate-50 active:translate-y-1 active:border-b-[2px]'} ${taskPhase === 'prepare_water' ? 'highlight-target' : ''}`}>
                        {hasMatchInHand && isBurnerLit ? <FlameIcon className="w-6 h-6 sm:w-8 sm:h-8 text-rose-600"/> : <Droplets className="w-6 h-6 sm:w-8 sm:h-8" />} 
                        {hasMatchInHand && isBurnerLit ? 'マッチを水に捨てる' : waterInAshtray ? '水 準備完了' : '燃えかす入れに水'}
                    </button>
                    <button onClick={handleHose} disabled={taskPhase.startsWith('emergency') || taskPhase === 'inspect'} className={`p-3 sm:p-6 rounded-2xl sm:rounded-[2rem] font-black text-xs sm:text-xl flex flex-col items-center gap-1 sm:gap-3 border-b-4 sm:border-b-[6px] transition-all shadow-sm ${isHoseConnected || taskPhase.startsWith('emergency') || taskPhase === 'inspect' ? 'bg-slate-200 text-slate-500 border-slate-300' : 'bg-white border-slate-400 text-slate-800 hover:bg-slate-50 active:translate-y-1 active:border-b-[2px]'} ${['prepare_hose', 'cleanup_hose'].includes(taskPhase) ? 'highlight-target' : ''}`}>
                        <PlugZap className="w-6 h-6 sm:w-8 sm:h-8" /> {isHoseConnected ? 'ゴム管接続済' : 'ゴム管を繋ぐ'}
                    </button>
                    <button onClick={handleMatch} disabled={hasMatchInHand || taskPhase.startsWith('emergency') || taskPhase.startsWith('inspect')} className={`p-3 sm:p-6 rounded-2xl sm:rounded-[2rem] font-black text-xs sm:text-xl flex flex-col items-center gap-1 sm:gap-3 border-b-4 sm:border-b-[6px] transition-all shadow-sm ${hasMatchInHand || taskPhase.startsWith('emergency') || taskPhase.startsWith('inspect') ? 'bg-slate-200 text-slate-500 border-slate-300' : 'bg-orange-100 border-orange-500 text-orange-900 hover:bg-orange-200 active:translate-y-1 active:border-b-[2px]'} ${taskPhase === 'ignite_match' ? 'highlight-target' : ''}`}>
                        <FlameIcon className="w-6 h-6 sm:w-8 sm:h-8" /> {hasMatchInHand ? 'マッチ着火済' : 'マッチをつける'}
                    </button>
                </div>

                <div className={`flex justify-evenly gap-3 sm:gap-6 bg-slate-100 p-4 sm:p-8 rounded-2xl sm:rounded-[2rem] border-4 shadow-sm ${taskPhase.startsWith('emergency') ? 'border-red-400' : 'border-slate-300'}`}>
                  <RealValve isOpen={mainValve} onClick={handleMainValve} label="元栓" disabled={!isHoseConnected} isCock={false} highlight={['ignite_main', 'extinguish_main'].includes(taskPhase)} />
                  <RealValve isOpen={cock} onClick={handleCock} label="コック" disabled={!isHoseConnected} isCock={true} highlight={['ignite_cock', 'extinguish_cock'].includes(taskPhase)} />
                </div>

                <div className="space-y-4 sm:space-y-8">
                  <DragDial 
                    label="空気調節ねじ(上)" value={airLevel} visualValue={airLevel + gasLevel} onChange={updateAir} icon={<Wind className="w-6 h-6 sm:w-8 sm:h-8" />} colorTheme="blue" 
                    disabled={taskPhase === 'emergency' && airLevel === 0} stuckLevel={stuckState.air} onTryStuck={() => handleTryStuck('air')} 
                    highlight={['inspect', 'cleanup_screw'].includes(taskPhase)} 
                  />
                  <DragDial 
                    label="ガス調節ねじ(下)" value={gasLevel} visualValue={gasLevel} onChange={updateGas} icon={<FlameIcon className="w-6 h-6 sm:w-8 sm:h-8" />} colorTheme="red" 
                    disabled={false} stuckLevel={stuckState.gas} onTryStuck={() => handleTryStuck('gas')} 
                    highlight={['inspect', 'cleanup_screw'].includes(taskPhase)} 
                  />
                </div>

                {taskPhase.startsWith('cleanup') && (
                    <button onClick={handleFinish} className="w-full py-5 sm:py-8 mt-6 sm:mt-10 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl sm:rounded-3xl font-black text-xl sm:text-3xl shadow-xl flex items-center justify-center gap-2 sm:gap-4 border-b-4 sm:border-b-[8px] border-slate-950 active:translate-y-2 active:border-b-0 transition-all highlight-target">
                        <LogOut className="w-6 h-6 sm:w-10 sm:h-10" strokeWidth={3} /> 全ての片付けを完了
                    </button>
                )}
              </div>
            )}
          </div>
        </div>
    </div>
  );
};
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
